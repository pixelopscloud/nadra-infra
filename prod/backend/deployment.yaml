apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nadra-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: nadraacr.azurecr.io/nadra-backend:72fde8bc39f95b57f1df48f5a41c7f499d7d67bc
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_USER
          value: nadra
        - name: DB_PASSWORD
          value: nadra123
        - name: DB_NAME
          value: nadradb
        ports:
        - containerPort: 3000
