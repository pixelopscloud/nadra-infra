apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nadra-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nadraacr.azurecr.io/nadra-frontend:72fde8bc39f95b57f1df48f5a41c7f499d7d67bc
        ports:
        - containerPort: 80
