apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nadra-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nadraacr.azurecr.io/nadra-frontend:c456f0db997596fd628f107eaa9382c8235cda4c
        ports:
        - containerPort: 80
