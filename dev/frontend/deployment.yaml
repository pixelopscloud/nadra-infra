apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nadra-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nadraacr.azurecr.io/nadra-frontend:e053e325bfb97a2d4a9c88297c378bc8c2f94b1d
        ports:
        - containerPort: 80
